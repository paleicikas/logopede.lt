<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumento generatorius</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .sound-btn {
            display: inline-block;
            padding: 2px 10px;
            margin: 2px 3px;
            border: 1.5px solid #0d6efd;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9rem;
            user-select: none;
            background: white;
            color: #0d6efd;
            transition: background 0.1s, color 0.1s;
        }
        .sound-btn:hover { background: #e7f0ff; }
        .sound-btn.selected { background: #0d6efd; color: white; }
        .sound-btn.selected:hover { background: #0a58ca; }
        .sound-input-row {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin: 2px 3px;
        }
        #documentCol {
            position: sticky;
            top: 70px;
            align-self: flex-start;
        }
        .document-preview-container {
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }
        .sticky-top-nav {
            position: sticky;
            top: 0;
            z-index: 1020;
        }
    </style>
</head>
<body>
    <!-- Document switcher -->
    <div class="border-bottom bg-light py-2 px-4 d-flex align-items-center gap-3 sticky-top-nav">
        <span class="small text-muted fw-semibold">Dokumentas:</span>
        <ul class="nav nav-pills nav-fill" id="docTabs" style="gap:4px"></ul>
    </div>

    <div class="container-fluid py-4 px-4">
        <div class="row align-items-start" id="mainRow">
            <!-- Document preview (hidden initially) -->
            <div class="col-md-9 d-none" id="documentCol">
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <strong>Sugeneruotas dokumentas</strong>
                        <button class="btn btn-sm btn-outline-primary" id="btnCopy">
                            <i class="bi bi-clipboard"></i> Kopijuoti
                        </button>
                    </div>
                    <div class="card-body bg-warning-subtle bg-opacity-25 document-preview-container" id="documentPreview">
                        <p class="text-muted">Pasirinkite bent vieną elementą.</p>
                    </div>
                </div>
            </div>

            <!-- Form column -->
            <div class="col-12" id="formCol">
                <div class="card mb-3">
                    <div class="card-header">
                        <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Ieškoti...">
                    </div>
                    <div class="card-body">
                        <div id="formFields">
                            <p class="text-muted">Kraunama...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="copyToast" class="toast align-items-center text-bg-success" role="alert">
            <div class="d-flex">
                <div class="toast-body">Dokumentas nukopijuotas!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let data = [];
        let documents = [];
        let currentDoc = null;
        let isGenerated = false;

        // ── Bootstrap ──────────────────────────────────────────────

        async function init() {
            try {
                const v = Date.now();
                documents = await fetch(`documents.json?v=${v}`).then(r => r.json());
                renderTabs();
                await switchDocument(0);
            } catch (e) {
                document.getElementById('formFields').innerHTML =
                    '<p class="text-danger">Nepavyko užkrauti documents.json</p>';
            }
        }

        function renderTabs() {
            document.getElementById('docTabs').innerHTML = documents.map((doc, i) =>
                `<li class="nav-item">
                    <a class="nav-link py-1 px-3 small" href="#"
                       onclick="switchDocument(${i}); return false;">${esc(doc.name)}</a>
                </li>`
            ).join('');
        }

        async function switchDocument(idx) {
            currentDoc = documents[idx];

            document.querySelectorAll('#docTabs .nav-link').forEach((el, i) =>
                el.classList.toggle('active', i === idx)
            );

            isGenerated = false;
            switchToInitialLayout();
            document.getElementById('searchInput').value = '';
            document.getElementById('formFields').innerHTML = '<p class="text-muted">Kraunama...</p>';

            try {
                const v = Date.now();
                data = await fetch(`${currentDoc.file}?v=${v}`).then(r => r.json());
                renderForm();
            } catch (e) {
                document.getElementById('formFields').innerHTML =
                    `<p class="text-danger">Nepavyko užkrauti ${esc(currentDoc.file)}</p>`;
            }
        }

        // ── Helpers ────────────────────────────────────────────────

        function esc(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
                .replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function eid(fi, si, ei) {
            return (si !== null && si !== undefined && si !== '')
                ? `f${fi}_s${si}_e${ei}`
                : `f${fi}_e${ei}`;
        }

        // ── Render ─────────────────────────────────────────────────

        function renderEntry(entry, fi, si, ei) {
            const id = eid(fi, si, ei);
            const siAttr = (si !== null && si !== undefined) ? si : '';

            switch (entry.type) {
                case 'radio': {
                    let html = `<div class="form-check form-check-inline">
                        <input class="form-check-input entry-radio" type="radio"
                               name="radio_${fi}" id="rb_${id}"
                               value="${esc(entry.label)}" data-fi="${fi}" data-ei="${ei}">
                        <label class="form-check-label" for="rb_${id}">${esc(entry.label)}</label>
                    </div>`;
                    if (entry.checkboxes && entry.checkboxes.length) {
                        html += `<div class="ms-4 d-none mb-1" id="rcb_${fi}_${ei}">`;
                        html += entry.checkboxes.map((cb, ci) =>
                            `<div class="form-check form-check-inline">
                                <input class="form-check-input entry-nested-cb" type="checkbox"
                                       id="ncb_${fi}_${ei}_${ci}" value="${esc(cb)}" data-fi="${fi}">
                                <label class="form-check-label" for="ncb_${fi}_${ei}_${ci}">${esc(cb)}</label>
                            </div>`
                        ).join('');
                        html += '</div>';
                    }
                    return html;
                }

                case 'checkbox':
                    return `<div class="form-check mb-1">
                        <input class="form-check-input entry-cb" type="checkbox"
                               id="cb_${id}" data-fi="${fi}" data-si="${siAttr}" data-ei="${ei}">
                        <label class="form-check-label" for="cb_${id}">${esc(entry.label)}</label>
                    </div>`;

                case 'checkbox_input':
                    return `<div class="form-check mb-1 d-flex align-items-center gap-2 flex-wrap">
                        <input class="form-check-input flex-shrink-0 entry-cb" type="checkbox"
                               id="cb_${id}" data-fi="${fi}" data-si="${siAttr}" data-ei="${ei}">
                        <label class="form-check-label" for="cb_${id}">${esc(entry.label)}</label>
                        <input type="text" class="form-control form-control-sm entry-text"
                               id="txt_${id}" style="width:160px;display:none" placeholder="(papildyti)">
                    </div>`;

                case 'sound':
                case 'sound_pair':
                    return `<span class="sound-btn" id="sb_${id}"
                               data-fi="${fi}" data-si="${siAttr}" data-ei="${ei}"
                               onclick="toggleSound(this)">[${esc(entry.label)}]</span>`;

                case 'sound_input':
                    return `<span class="sound-input-row">
                        <span class="sound-btn" id="sb_${id}"
                              data-fi="${fi}" data-si="${siAttr}" data-ei="${ei}"
                              onclick="toggleSoundInput(this)">[${esc(entry.label)}]</span>
                        <input type="text" class="form-control form-control-sm"
                               id="sitxt_${id}" style="width:120px;display:none;font-size:0.8rem"
                               placeholder="(kontekstas)">
                    </span>`;

                default:
                    return '';
            }
        }

        function renderForm() {
            const container = document.getElementById('formFields');
            if (!data.length) {
                container.innerHTML = '<p class="text-muted">Nėra duomenų.</p>';
                return;
            }

            container.innerHTML = data.map((field, fi) => {
                // Build full-text search index for this field
                const searchParts = [field.title];
                if (field.entries) {
                    field.entries.forEach(e => {
                        if (e.label) searchParts.push(e.label);
                        if (e.checkboxes) e.checkboxes.forEach(cb => searchParts.push(cb));
                    });
                }
                if (field.subsections) {
                    field.subsections.forEach(sub => {
                        if (sub.label) searchParts.push(sub.label);
                        sub.entries.forEach(e => { if (e.label) searchParts.push(e.label); });
                    });
                }
                const searchText = searchParts.join(' ').toLowerCase();

                let html = `<div class="mb-3 pb-2 border-bottom field-group"
                                 data-title="${esc(field.title.toLowerCase())}"
                                 data-search="${esc(searchText)}">`;
                html += `<div class="fw-bold mb-2">${esc(field.title)} `;
                html += `<a href="#" class="fw-normal text-decoration-none small text-muted ms-1 d-none"
                            data-clear="${fi}" onclick="clearField(${fi}); return false;">&#x2715;</a></div>`;

                if (field.entries && field.entries.length) {
                    let inSoundRow = false;
                    field.entries.forEach((entry, ei) => {
                        const isBlock = entry.type === 'radio' || entry.type === 'checkbox' || entry.type === 'checkbox_input';
                        if (isBlock) {
                            if (inSoundRow) { html += '</div>'; inSoundRow = false; }
                        } else {
                            if (!inSoundRow) { html += '<div class="mb-2">'; inSoundRow = true; }
                        }
                        html += renderEntry(entry, fi, null, ei);
                    });
                    if (inSoundRow) html += '</div>';
                }

                if (field.subsections && field.subsections.length) {
                    field.subsections.forEach((sub, si) => {
                        html += `<div class="mt-2 ms-2 ps-2 border-start">
                            <div class="small text-muted fst-italic mb-1">${esc(sub.label)}</div>
                            <div class="mb-1">`;
                        sub.entries.forEach((entry, ei) => {
                            html += renderEntry(entry, fi, si, ei);
                        });
                        html += '</div></div>';
                    });
                }

                html += '</div>';
                return html;
            }).join('');

            attachListeners();
        }

        function attachListeners() {
            const container = document.getElementById('formFields');

            // Radio
            container.querySelectorAll('.entry-radio').forEach(radio => {
                radio.addEventListener('change', () => {
                    const fi = radio.dataset.fi;
                    const ei = radio.dataset.ei;
                    container.querySelectorAll(`[id^="rcb_${fi}_"]`).forEach(el => {
                        el.classList.add('d-none');
                        el.querySelectorAll('input').forEach(cb => cb.checked = false);
                    });
                    const group = document.getElementById(`rcb_${fi}_${ei}`);
                    if (group) group.classList.remove('d-none');
                    updateClearLink(fi);
                    onFieldChange();
                });
            });

            // Nested checkboxes (just update preview)
            container.querySelectorAll('.entry-nested-cb').forEach(cb => {
                cb.addEventListener('change', () => {
                    if (isGenerated) updateDocument();
                });
            });

            // Standalone checkboxes
            container.querySelectorAll('.entry-cb').forEach(cb => {
                cb.addEventListener('change', () => {
                    const { fi, si, ei } = cb.dataset;
                    const id = si !== '' ? `f${fi}_s${si}_e${ei}` : `f${fi}_e${ei}`;
                    const txt = document.getElementById(`txt_${id}`);
                    if (txt) {
                        txt.style.display = cb.checked ? 'inline-block' : 'none';
                        if (!cb.checked) txt.value = '';
                    }
                    updateClearLink(fi);
                    onFieldChange();
                });
            });

            // Text inputs (checkbox_input and sound_input)
            container.querySelectorAll('.entry-text, [id^="sitxt_"]').forEach(txt => {
                txt.addEventListener('input', () => {
                    if (isGenerated) updateDocument();
                });
            });
        }

        // ── Sound toggles ──────────────────────────────────────────

        function toggleSound(el) {
            el.classList.toggle('selected');
            updateClearLink(el.dataset.fi);
            onFieldChange();
        }

        function toggleSoundInput(el) {
            el.classList.toggle('selected');
            const { fi, si, ei } = el.dataset;
            const id = eid(fi, si, ei);
            const txt = document.getElementById(`sitxt_${id}`);
            if (txt) {
                txt.style.display = el.classList.contains('selected') ? 'inline-block' : 'none';
                if (!el.classList.contains('selected')) txt.value = '';
            }
            updateClearLink(fi);
            onFieldChange();
        }

        // ── State helpers ──────────────────────────────────────────

        function updateClearLink(fi) {
            const container = document.getElementById('formFields');
            const hasAny =
                container.querySelectorAll(`input[name="radio_${fi}"]:checked`).length > 0 ||
                container.querySelectorAll(`.entry-cb[data-fi="${fi}"]:checked`).length > 0 ||
                container.querySelectorAll(`.sound-btn[data-fi="${fi}"].selected`).length > 0;
            const link = document.querySelector(`[data-clear="${fi}"]`);
            if (link) link.classList.toggle('d-none', !hasAny);
        }

        function clearField(fi) {
            const container = document.getElementById('formFields');

            document.querySelectorAll(`input[name="radio_${fi}"]`).forEach(r => r.checked = false);
            container.querySelectorAll(`[id^="rcb_${fi}_"]`).forEach(el => {
                el.classList.add('d-none');
                el.querySelectorAll('input').forEach(cb => cb.checked = false);
            });

            container.querySelectorAll(`.entry-cb[data-fi="${fi}"]`).forEach(cb => {
                cb.checked = false;
                const { si, ei } = cb.dataset;
                const id = si !== '' ? `f${fi}_s${si}_e${ei}` : `f${fi}_e${ei}`;
                const txt = document.getElementById(`txt_${id}`);
                if (txt) { txt.style.display = 'none'; txt.value = ''; }
            });

            container.querySelectorAll(`.sound-btn[data-fi="${fi}"]`).forEach(btn => {
                btn.classList.remove('selected');
                const { si, ei } = btn.dataset;
                const id = eid(fi, si, ei);
                const txt = document.getElementById(`sitxt_${id}`);
                if (txt) { txt.style.display = 'none'; txt.value = ''; }
            });

            const link = document.querySelector(`[data-clear="${fi}"]`);
            if (link) link.classList.add('d-none');
            onFieldChange();
        }

        function onFieldChange() {
            const container = document.getElementById('formFields');
            const anySelected =
                container.querySelectorAll('.entry-radio:checked').length > 0 ||
                container.querySelectorAll('.entry-cb:checked').length > 0 ||
                container.querySelectorAll('.sound-btn.selected').length > 0;

            if (anySelected && !isGenerated) {
                switchToGeneratedLayout();
            } else if (!anySelected && isGenerated) {
                switchToInitialLayout();
            } else if (isGenerated) {
                updateDocument();
            }
        }

        // ── Document generation ────────────────────────────────────

        function getSelections() {
            const container = document.getElementById('formFields');
            const results = [];

            data.forEach((field, fi) => {
                const r = { title: field.title, radioLabel: null, radioSubs: [], lines: [], sounds: [], subGroups: [] };
                let hasAny = false;

                if (field.entries) {
                    const radio = document.querySelector(`input[name="radio_${fi}"]:checked`);
                    if (radio) {
                        r.radioLabel = radio.value;
                        hasAny = true;
                        container.querySelectorAll(`#rcb_${fi}_${radio.dataset.ei} input:checked`).forEach(cb => {
                            r.radioSubs.push(cb.value);
                        });
                    }

                    field.entries.forEach((entry, ei) => {
                        if (entry.type === 'radio') return;
                        const id = `f${fi}_e${ei}`;

                        if (entry.type === 'checkbox') {
                            const cb = document.getElementById(`cb_${id}`);
                            if (cb && cb.checked) { r.lines.push(entry.label); hasAny = true; }

                        } else if (entry.type === 'checkbox_input') {
                            const cb = document.getElementById(`cb_${id}`);
                            if (cb && cb.checked) {
                                const txt = document.getElementById(`txt_${id}`);
                                const val = txt ? txt.value.trim() : '';
                                r.lines.push(val ? `${entry.label}: ${val}` : entry.label);
                                hasAny = true;
                            }

                        } else if (entry.type === 'sound' || entry.type === 'sound_pair') {
                            const btn = document.getElementById(`sb_${id}`);
                            if (btn && btn.classList.contains('selected')) {
                                r.sounds.push(`[${entry.label}]`);
                                hasAny = true;
                            }

                        } else if (entry.type === 'sound_input') {
                            const btn = document.getElementById(`sb_${id}`);
                            if (btn && btn.classList.contains('selected')) {
                                const txt = document.getElementById(`sitxt_${id}`);
                                const val = txt ? txt.value.trim() : '';
                                r.sounds.push(val ? `[${entry.label}] ${val}` : `[${entry.label}]`);
                                hasAny = true;
                            }
                        }
                    });
                }

                if (field.subsections) {
                    field.subsections.forEach((sub, si) => {
                        const pairs = [];
                        sub.entries.forEach((entry, ei) => {
                            const btn = document.getElementById(`sb_f${fi}_s${si}_e${ei}`);
                            if (btn && btn.classList.contains('selected')) {
                                pairs.push(`[${entry.label}]`);
                                hasAny = true;
                            }
                        });
                        if (pairs.length) r.subGroups.push({ label: sub.label, pairs });
                    });
                }

                if (hasAny) results.push(r);
            });

            return results;
        }

        function updateDocument() {
            const preview = document.getElementById('documentPreview');
            const selections = getSelections();
            const inline = currentDoc && currentDoc.outputStyle === 'inline';

            if (!selections.length) {
                preview.innerHTML = '<p class="text-muted">Pasirinkite bent vieną elementą.</p>';
                return;
            }

            preview.innerHTML = selections.map(s => {
                // Radio field — always single-line
                if (s.radioLabel) {
                    let text = esc(s.radioLabel.toLowerCase());
                    if (s.radioSubs.length) {
                        text += ` (${s.radioSubs.map(v => esc(v.toLowerCase())).join(', ')})`;
                    }
                    return `<p class="mb-0"><strong>${esc(s.title)}:</strong> ${text}</p>`;
                }

                // Inline style: one line per section
                if (inline) {
                    const all = [
                        ...s.lines.map(l => esc(l.toLowerCase())),
                        ...s.sounds.map(esc),
                        ...s.subGroups.flatMap(sg => sg.pairs.map(esc))
                    ];
                    return `<p class="mb-0"><strong>${esc(s.title)}:</strong> ${all.join(', ')}</p>`;
                }

                // Block style: bullet points
                let html = `<p class="mb-1"><strong>${esc(s.title)}:</strong></p>`;
                if (s.sounds.length) {
                    html += `<p class="mb-1 ms-3">${s.sounds.map(esc).join(' ')}</p>`;
                }
                s.lines.forEach(line => {
                    html += `<p class="mb-0 ms-3">– ${esc(line)}</p>`;
                });
                s.subGroups.forEach(sg => {
                    html += `<p class="mb-0 ms-3"><em>${esc(sg.label)}</em> ${sg.pairs.map(esc).join(' ')}</p>`;
                });
                return html + '<div class="mb-2"></div>';
            }).join('');
        }

        // ── Layout ─────────────────────────────────────────────────

        function switchToGeneratedLayout() {
            isGenerated = true;
            document.getElementById('documentCol').classList.remove('d-none');
            document.getElementById('formCol').classList.replace('col-12', 'col-md-3');
            updateDocument();
        }

        function switchToInitialLayout() {
            isGenerated = false;
            document.getElementById('documentCol').classList.add('d-none');
            const fc = document.getElementById('formCol');
            if (!fc.classList.contains('col-12')) fc.classList.replace('col-md-3', 'col-12');
        }

        // ── Copy ───────────────────────────────────────────────────

        async function copyDocument() {
            const preview = document.getElementById('documentPreview');
            try {
                await navigator.clipboard.writeText(preview.innerText);
            } catch (e) {
                const range = document.createRange();
                range.selectNodeContents(preview);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                document.execCommand('copy');
                sel.removeAllRanges();
            }
            new bootstrap.Toast(document.getElementById('copyToast')).show();
        }

        document.getElementById('btnCopy').addEventListener('click', copyDocument);

        document.getElementById('searchInput').addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.field-group').forEach(group =>
                group.classList.toggle('d-none', !group.dataset.search.includes(term))
            );
        });

        init();
    </script>
</body>
</html>
